services:
  examageddon:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Data Source=/data/examageddon.db"
      DataProtection__KeysPath: /data/keys
    volumes:
      - examageddon-db:/data

volumes:
  examageddon-db:
